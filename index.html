<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pomodoro Timer</title>
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary-font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --bg-overlay: rgba(0, 0, 0, 0.4); /* Darkens bg for text contrast */
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-active: #000000;
            --btn-active-bg: #ffffff;
            
            /* Durations in minutes */
            --time-pomo: 25;
            --time-short: 5;
            --time-long: 15;
        }

        * {
            margin: 0;
            padding: 0;
            box-shadow: border-box;
        }

        body, html {
            height: 100%;
            font-family: var(--primary-font);
            overflow: hidden;
            background-color: #2c3e50; /* Fallback color */
        }

        /* --- BACKGROUND HANDLING --- */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?q=80&w=2000'); /* High-res forest/lake */
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-overlay);
            z-index: -1;
        }

        /* --- MAIN LAYOUT --- */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            padding: 40px 20px;
            color: var(--text-main);
            text-align: center;
        }

        button {
            font-family: var(--primary-font);
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            outline: none;
        }

        /* --- MODE SELECTOR (TOP) --- */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .mode-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(5px); /* Frosty effect */
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .mode-btn.active {
            background: var(--btn-active-bg);
            color: var(--text-active);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* --- TIMER DISPLAY (CENTER) --- */
        .timer-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-display {
            font-size: 150px; /* Large and bold */
            font-weight: 700;
            letter-spacing: -5px;
            margin: 0;
            line-height: 1;
        }

        /* --- CONTROLS (LOWER) --- */
        .control-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .start-btn {
            background: var(--btn-active-bg);
            color: var(--text-active);
            padding: 15px 60px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
        }

        .start-btn:active {
            transform: translateY(1px);
        }

        /* Reset Icon Button */
        .reset-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(-150deg); /* Playful animation */
        }

        .reset-btn svg {
            fill: var(--text-main);
            width: 24px;
            height: 24px;
        }

        /* --- FOOTER BUTTON --- */
        .footer-container {
            margin-bottom: 20px;
        }

        .next-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .next-btn:hover {
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 600px) {
            .timer-display {
                font-size: 90px;
                letter-spacing: -2px;
            }
            .mode-btn {
                padding: 8px 15px;
                font-size: 12px;
            }
            .start-btn {
                padding: 12px 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="background-container" id="bg-image"></div>
    <div class="overlay"></div>

    <div class="main-container">
        <div class="mode-selector">
            <button class="mode-btn active" data-time="pomo">Pomodoro</button>
            <button class="mode-btn" data-time="short">Short Break</button>
            <button class="mode-btn" data-time="long">Long Break</button>
        </div>

        <div class="timer-container">
            <h1 class="timer-display" id="time-display">25:00</h1>
        </div>

        <div class="control-container">
            <button class="start-btn" id="start-btn">Start</button>
            <button class="reset-btn" id="reset-btn" title="Reset Timer">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
        </div>

        <div class="footer-container">
            <button class="next-btn" id="next-mode-btn">Next Image / Mode</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const times = {
            pomo: 25 * 60,  // 25 minutes in seconds
            short: 5 * 60,  // 5 minutes
            long: 15 * 60   // 15 minutes
        };

        // Beautiful, high-res background images (Nature theme)
        const backgroundImages = [
            'https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?q=80&w=2000', // Forest Lake (Original)
            'https://images.unsplash.com/photo-1473448912268-2022ce9509d8?q=80&w=2000', // Misty Forest
            'https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2000'  // Forest Sunlight
        ];

        // --- DOM ELEMENTS ---
        const timeDisplay = document.getElementById('time-display');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const nextModeBtn = document.getElementById('next-mode-btn');
        const bgImage = document.getElementById('bg-image');

        // --- STATE VARIABLES ---
        let currentMode = 'pomo';
        let timeLeft = times[currentMode];
        let timerInterval = null;
        let isRunning = false;
        let currentBgIndex = 0;

        // --- FUNCTIONS ---

        // Format seconds into MM:SS
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // Update the main timer display
        function updateDisplay() {
            timeDisplay.textContent = formatTime(timeLeft);
            // Optional: Update browser tab title
            document.title = `${formatTime(timeLeft)} - Pomodoro`;
        }

        // Switch timer mode (Pomodoro, Short, Long)
        function switchMode(mode) {
            currentMode = mode;
            timeLeft = times[mode];
            isRunning = false;
            clearInterval(timerInterval);
            startBtn.textContent = 'Start';
            updateDisplay();

            // Update active button state
            modeBtns.forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-time="${mode}"]`).classList.add('active');
        }

        // Start or Pause the timer
        function toggleTimer() {
            if (isRunning) {
                // Pause logic
                clearInterval(timerInterval);
                startBtn.textContent = 'Start';
            } else {
                // Start logic
                startBtn.textContent = 'Pause';
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateDisplay();

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        // Optional: Play a sound here
                        alert('Time is up! Take a break or get back to work.');
                        resetTimer();
                    }
                }, 1000);
            }
            isRunning = !isRunning;
        }

        // Reset the timer to the start of the current mode
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = times[currentMode];
            startBtn.textContent = 'Start';
            updateDisplay();
        }

        // Cycle through background images
        function changeBackground() {
            currentBgIndex = (currentBgIndex + 1) % backgroundImages.length;
            bgImage.style.backgroundImage = `url('${backgroundImages[currentBgIndex]}')`;
        }

        // --- EVENT LISTENERS ---

        // Mode buttons
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.getAttribute('data-time');
                if (mode !== currentMode) {
                    switchMode(mode);
                }
            });
        });

        // Control buttons
        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);

        // Footer button: Changes background only
        nextModeBtn.addEventListener('click', changeBackground);

        // --- INITIALIZATION ---
        updateDisplay();

    </script>
</body>
</html>
