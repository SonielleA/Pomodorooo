<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HD Aesthetic Pomodoro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --white: #ffffff;
      --black: #000000;
      --overlay: rgba(0, 0, 0, 0.35);
      --glass: rgba(255, 255, 255, 0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      container-type: inline-size;
    }

    .widget-container {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: background-image 0.8s ease-in-out;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Subtle overlay to make text pop against HD backgrounds */
    .widget-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--overlay);
      z-index: 1;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      text-align: center;
      color: var(--white);
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 1.2cqh;
    }

    #pomodoro-timer {
      font-size: clamp(45px, 28cqw, 130px); 
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 0.9;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .mode-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .mode-btn {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--white);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: clamp(10px, 3.5cqw, 14px);
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .mode-btn.active {
      background: var(--white);
      color: var(--black);
      transform: scale(1.05);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
    }

    #start-btn {
      background: var(--white);
      color: var(--black);
      border: none;
      padding: 12px 35px;
      border-radius: 50px;
      font-weight: 800;
      font-size: clamp(13px, 4.5cqw, 18px);
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .icon-btn {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--white);
      width: clamp(38px, 11cqw, 48px);
      height: clamp(38px, 11cqw, 48px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .icon-btn:hover { transform: rotate(180deg); }

    .theme-toggle {
      position: absolute;
      bottom: 20px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      padding: 6px 15px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 20;
    }
  </style>
</head>
<body>

<div class="widget-container" id="bg-container"></div>

<div class="content-wrapper">
  <div class="mode-row">
    <button class="mode-btn active" onclick="setTimer(25, this)">Pomo</button>
    <button class="mode-btn" onclick="setTimer(5, this)">Short</button>
    <button class="mode-btn" onclick="setTimer(15, this)">Long</button>
  </div>

  <div id="pomodoro-timer">25:00</div>

  <div class="actions">
    <button id="start-btn" onclick="toggleTimer()">Start</button>
    <button class="icon-btn" onclick="resetTimer()">↻</button>
  </div>
</div>

<button class="theme-toggle" id="theme-btn" onclick="nextImage()">Next Background</button>

<script>
  // High-Resolution Curated Collection
  const images = [
    'https://images.unsplash.com/photo-1516979187457-637abb4f9353?q=80&w=2000', // Library
    'https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000', // Nature Lake
    'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2000', // Mountains
    'https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=2000', // Deep Forest
    'https://images.unsplash.com/photo-1477346611705-65d1883cee1e?q=80&w=2000'  // Night Forest
  ];
  
  let currentImgIndex = 0;
  const bgContainer = document.getElementById('bg-container');
  bgContainer.style.backgroundImage = `url('${images[currentImgIndex]}')`;

  function nextImage() {
    currentImgIndex = (currentImgIndex + 1) % images.length;
    bgContainer.style.backgroundImage = `url('${images[currentImgIndex]}')`;
  }

  let defaultMins = 25;
  let timeLeft = defaultMins * 60;
  let timerId = null;
  let isRunning = false;
  const display = document.getElementById('pomodoro-timer');
  const startBtn = document.getElementById('start-btn');

  function updateDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    display.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  function setTimer(mins, btn) {
    defaultMins = mins;
    resetTimer();
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function toggleTimer() {
    if (isRunning) {
      clearInterval(timerId);
      startBtn.textContent = 'Start';
    } else {
      timerId = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerId);
          alert("Focus session complete!");
        }
      }, 1000);
      startBtn.textContent = 'Pause';
    }
    isRunning = !isRunning;
  }

  function resetTimer() {
    clearInterval(timerId);
    isRunning = false;
    startBtn.textContent = 'Start';
    timeLeft = defaultMins * 60;
    updateDisplay();
  }
</script>

</body>
</html>
